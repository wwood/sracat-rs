[workspace]
authors = ["Ben Woodcroft <benjwoodcroft@gmail.com>"]
channels = ["conda-forge", "bioconda"]
name = "sracat-rs"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
build = "cargo build --release"
fetch-testdata = "snakemake --cores 1"
test = { cmd = "cargo test", depends-on = ["fetch-testdata"] }
sracat-rs = "cargo run --release --"

[dependencies]
ncbi-vdb = "==3.4.1"
rust = ">=1.96.0,<1.97"
c-compiler = ">=1.11.0,<2"
zlib = ">=1.3.2,<2"
snakemake = ">=9.23.1,<10"
sra-tools = ">=3.4.1,<4"
snakemake-executor-plugin-cluster-generic = ">=1.0.9,<2"
